<section class="widget-box hub-box" [style.background]="bg()" [style.width.px]="widget.width"
         [style.height.px]="widget.height || null" (pointerdown)="startDrag($event)">

  <header class="widget-header">
    <div class="header-info">
      <ion-icon class="widget-type-icon" name="git-network-outline"></ion-icon>
      <span class="ticker-name">{{ widget.title || (nameKey | transloco) }}</span>
    </div>

    <div class="widget-controls">
      <ion-button fill="clear" size="small" class="control-btn" title="Collega a una sorgente dati"
                  (click)="requestLink($event)">
        <ion-icon slot="icon-only" name="git-network-outline"></ion-icon>
      </ion-button>
      <ion-button fill="clear" size="small" class="control-btn" title="Duplica"
                  (click)="requestDuplicate($event)">
        <ion-icon slot="icon-only" name="copy-outline"></ion-icon>
      </ion-button>
      <ion-button fill="clear" size="small" class="control-btn" title="Minimizza"
                  (click)="toggleMinimize($event)">
        <ion-icon slot="icon-only" [name]="widget.minimize ? 'add-outline' : 'remove-outline'"></ion-icon>
      </ion-button>
      <ion-button fill="clear" size="small" class="control-btn close" title="Chiudi"
                  (click)="requestRemove($event)">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </div>
  </header>

  @if (!widget.minimize) {
    <main class="widget-content terminal-body" (pointerdown)="$event.stopPropagation()">
      @if (connectedWidgets.length > 0) {
        @for (cw of connectedWidgets; track cw.id) {
          <div class="terminal-id-row">LINK: {{ cw.id }} &middot; {{ cw.title }}</div>
        }
      } @else {
        <div class="terminal-empty">[VUOTO]</div>
      }
    </main>
  }

  <div class="resize-handle" appResize [appResizeTarget]="widget" [appResizeZoom]="zoomLevel"></div>
</section>
